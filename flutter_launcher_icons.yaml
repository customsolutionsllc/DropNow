# App icon configuration for DropNow
# Run: dart run flutter_launcher_icons
# Place a 1024x1024 icon at assets/icon/icon.png before running.

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#4FC3F7"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
